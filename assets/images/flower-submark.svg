<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">

  <!-- Standalone anemone — centred at (60, 58) with stem below -->
  <g transform="translate(60,58)">

    <!-- 5 petals -->
    <ellipse cx="0" cy="-22" rx="11" ry="19" fill="#FFCA28"/>
    <ellipse cx="0" cy="-22" rx="11" ry="19" fill="#FFCA28" transform="rotate(72)"/>
    <ellipse cx="0" cy="-22" rx="11" ry="19" fill="#FFCA28" transform="rotate(144)"/>
    <ellipse cx="0" cy="-22" rx="11" ry="19" fill="#FFCA28" transform="rotate(216)"/>
    <ellipse cx="0" cy="-22" rx="11" ry="19" fill="#FFCA28" transform="rotate(288)"/>

    <!-- Vein lines -->
    <line x1="0" y1="-4" x2="0" y2="-39" stroke="#C9971A" stroke-width="1.2"/>
    <line x1="0" y1="-4" x2="0" y2="-39" stroke="#C9971A" stroke-width="1.2" transform="rotate(72)"/>
    <line x1="0" y1="-4" x2="0" y2="-39" stroke="#C9971A" stroke-width="1.2" transform="rotate(144)"/>
    <line x1="0" y1="-4" x2="0" y2="-39" stroke="#C9971A" stroke-width="1.2" transform="rotate(216)"/>
    <line x1="0" y1="-4" x2="0" y2="-39" stroke="#C9971A" stroke-width="1.2" transform="rotate(288)"/>

    <!-- Centre disc -->
    <circle cx="0" cy="0" r="9" fill="#0F3B2E"/>
    <!-- Stamen dots -->
    <circle cx="0" cy="-4" r="1.5" fill="#D4A536"/>
    <circle cx="3.8" cy="1.9" r="1.5" fill="#D4A536"/>
    <circle cx="-3.8" cy="1.9" r="1.5" fill="#D4A536"/>
    <circle cx="2.4" cy="-3.3" r="1" fill="#D4A536"/>
    <circle cx="-2.4" cy="-3.3" r="1" fill="#D4A536"/>
    <!-- Centre pip -->
    <circle cx="0" cy="0" r="3" fill="#FFCA28"/>

    <!-- Tapered stem -->
    <path d="M -3,8 L -3.5,44 L 3.5,44 L 3,8 Z" fill="#D4A536"/>
    <!-- Stem base rule -->
    <rect x="-13" y="42" width="26" height="3.5" rx="1.75" fill="#D4A536"/>

  </g>

</svg>
